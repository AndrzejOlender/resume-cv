name: LateX to PDF

on:
  push:
    branches:
      - master
      - dev
    tags:
       - '*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t resume-cv .
      - name: Compile Latex to PDF
        run: docker run --rm -v ${{ github.workspace }}:/root resume-cv pdflatex -interaction=nonstopmode main.tex
      - name: Rename PDF
        run: mv main.pdf CV_AndrzejOlender.pdf
      - name: Upload PDF to the workflow
        uses: actions/upload-artifact@v4
        with:
          name: CVAndrzejOlender
          path: CV_AndrzejOlender.pdf
